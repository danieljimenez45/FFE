{% extends "fragments/layout" %}

{% block titulo %}
    Cartelera — FFE Cinema
{% endblock %}

{% block contenido %}

    <div id="carouselPeliculas" class="carousel slide carousel-fade" data-bs-ride="carousel">

    <h1 class="text-center ti-cabecera">
        {{ message('home.ofertas') }}
    </h1>

        <!-- INDICADORES CARRUSEL -->
    <div class="carousel-indicators">

        <button type="button"
                data-bs-target="#carouselPeliculas"
                data-bs-slide-to="0"
                class="active">
        </button>

        <button type="button"
                data-bs-target="#carouselPeliculas"
                data-bs-slide-to="1">
        </button>

        <button type="button"
                data-bs-target="#carouselPeliculas"
                data-bs-slide-to="2">
        </button>

    </div>

        <!-- CARRUSEL DE IMAGENES -->
    <div class="carousel-inner">

        <div class="carousel-item active" data-bs-interval="4000">

            <img src="/images/index/inter_carr.png" class="d-block w-100" alt="Interstellar">

            <div class="carousel-caption">
                <a href="/peliculas/detalle/7" class="btn btn-outline-warning">
                    {{ message('home.boton.ver') }}
                </a>
            </div>
        </div>

        <div class="carousel-item">
            <img src="/images/index/origen_carr.png" class="d-block w-100" alt="Inception">

            <div class="carousel-caption">
                <a href="/peliculas/detalle/6" class="btn btn-outline-warning">
                    {{ message('home.boton.ver') }}
                </a>
            </div>
        </div>

        <div class="carousel-item">
            <img src="/images/index/gladita_carr.png" class="d-block w-100" alt="Gladiator">

            <div class="carousel-caption">
                <a href="/peliculas/detalle/10" class="btn btn-outline-warning">
                    {{ message('home.boton.ver') }}
                </a>
            </div>
        </div>

    </div>

        <!-- CONTROLADORES FLECHAS -->

</div>

{% endblock %}
