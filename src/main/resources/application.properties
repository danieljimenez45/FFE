spring.application.name=FFE

application.title=${APPLICATION_TITLE:Aplicacion de Venta de entradas de Cine con Spring Boot}
application.version=${APPLICATION_VERSION:1.0.0}

server.port=${PORT:3010}
api.version=${API_VERSION:v1}

## Base de datos de desarrollo (H2 en memoria)
spring.datasource.url=jdbc:h2:mem:cinepirest
spring.datasource.username=sa

# Consola H2 — habilitada aquí, las cadenas de seguridad la restringen a perfil dev
spring.h2.console.enabled=true

# Carga del schema y datos de prueba en cada arranque
spring.jpa.defer-datasource-initialization=true
spring.jpa.hibernate.ddl-auto=create-drop
spring.sql.init.mode=always
spring.sql.init.continue-on-error=false

## SQL
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

## Logging
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.web.access=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

## JWT
# El secreto NUNCA debe estar en claro en produccion.
# En prod se sobreescribe via variable de entorno JWT_SECRET.
# En dev se usa el valor por defecto (solo valido para desarrollo local).
jwt.secret=${JWT_SECRET:CineEsLaMejorPeliculaQueHeVistoNuncaYSiempreQuieroVolverAVerlaConMisAmigosYFamiliares}
# Expiracion en segundos (86400 = 24 horas)
jwt.expiration=${JWT_EXPIRATION:86400}

## Errores — en dev se muestra el mensaje para facilitar el depurado
spring.web.error.include-message=always
spring.web.error.include-stacktrace=never

## SWAGGER
springdoc.swagger-ui.enabled=true

## GRAPHQL
spring.graphql.graphiql.enabled=true
spring.graphql.graphiql.path=/graphiql
spring.graphql.http.path=/graphql

## PEBBLE Template Engine
pebble.suffix=.peb.html
pebble.cache=false
pebble.charset=UTF-8

## Configuracion DevTools
spring.devtools.restart.enabled=false
spring.devtools.restart.additional-paths=src/main/java,src/main/resources
spring.devtools.restart.exclude=static/**,public/**
spring.devtools.livereload.enabled=true
spring.devtools.livereload.port=35729
