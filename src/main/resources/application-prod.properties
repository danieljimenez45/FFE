# Producci\u00F3n (local o Docker)

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.sql.init.mode=never

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400}

spring.web.error.include-message=never
spring.web.error.include-stacktrace=never
spring.web.error.include-binding-errors=never

spring.h2.console.enabled=false
springdoc.swagger-ui.enabled=false
spring.graphql.graphiql.enabled=false

logging.level.org.springframework.security=INFO
logging.level.org.hibernate.orm.jdbc.bind=WARN
logging.level.root=WARN
logging.level.com.entradas_cine=INFO

server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:true}
server.servlet.session.cookie.same-site=strict

app.peliculas.poster-dir=${POSTER_DIR:uploads/peliculas}
