# Producci\u00F3n (local o Docker)

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.sql.init.mode=never

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400}

spring.web.error.include-message=never
spring.web.error.include-stacktrace=never
spring.web.error.include-binding-errors=never

spring.h2.console.enabled=false
springdoc.swagger-ui.enabled=false
spring.graphql.graphiql.enabled=false

logging.level.org.springframework.security=INFO
logging.level.org.hibernate.orm.jdbc.bind=WARN
logging.level.root=WARN
logging.level.com.entradas_cine=INFO

server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:true}
server.servlet.session.cookie.same-site=strict

app.peliculas.poster-dir=${POSTER_DIR:uploads/peliculas}

# Origen público de la app (CORS en /api/v1). Ej.: https://cine.tudominio.com
app.cors.allowed-origins=${APP_PUBLIC_URL:http://localhost:3010}

## Semilla del administrador inicial
# Sobreescribe con variables de entorno ADMIN_USERNAME, ADMIN_PASSWORD, ADMIN_EMAIL
# para no dejar la contraseña por defecto en producción.
admin.seed.username=${ADMIN_USERNAME:admin}
admin.seed.password=${ADMIN_PASSWORD:admin123}
admin.seed.email=${ADMIN_EMAIL:admin@cineffe.com}

## Traducción automática — DeepL
# DEEPL_API_KEY es obligatoria en prod para que las traducciones funcionen.
deepl.api.url=https://api-free.deepl.com/v2/translate
deepl.api.key=${DEEPL_API_KEY:}
# En prod la BD persiste, el seed solo actúa cuando la tabla de traducciones está vacía.
app.traduccion.auto-seed=true
# Pon TRADUCCION_FORCE_RESEED=true en el entorno para borrar y regenerar todas las traducciones al arrancar.
app.traduccion.force-reseed=${TRADUCCION_FORCE_RESEED:false}
