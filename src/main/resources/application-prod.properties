# ============================================================
# Perfil PRODUCCION — sobreescribe application.properties
# Variables de entorno OBLIGATORIAS para despliegue:
#
#   JWT_SECRET     — secreto HMAC-256 para firmar tokens JWT
#                    (min 32 chars; usar un valor aleatorio seguro)
#   JWT_EXPIRATION — tiempo de vida del token en segundos (p.ej. 86400)
#   DB_URL         — URL JDBC de la base de datos
#   DB_USERNAME    — usuario de la base de datos
#   DB_PASSWORD    — contrasena de la base de datos
#   PORT           — puerto HTTP (opcional, por defecto 3010)
# ============================================================

## Base de datos de produccion
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=validate
spring.sql.init.mode=never

## JWT — sin valor por defecto en prod (falla al arrancar si no se define)
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400}

## Seguridad: no exponer stack traces ni mensajes internos en respuestas de error
spring.web.error.include-message=never
spring.web.error.include-stacktrace=never
spring.web.error.include-binding-errors=never

## Deshabilitar herramientas de desarrollo
spring.h2.console.enabled=false
springdoc.swagger-ui.enabled=false
spring.graphql.graphiql.enabled=false

## Logging: nivel INFO en prod (no TRACE/DEBUG de seguridad)
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.orm.jdbc.bind=WARN
logging.level.root=WARN
logging.level.com.entradas_cine=INFO

## Sesion — timeout mas corto en prod
server.servlet.session.timeout=30m

## Cookies seguras en prod (HTTPS obligatorio)
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=strict
