# Desarrollo local (H2) o Docker (PostgreSQL vía variables DB_* en .env / compose)

spring.datasource.url=${DB_URL:jdbc:h2:mem:cinepirest}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.jpa.defer-datasource-initialization=true
spring.jpa.hibernate.ddl-auto=create-drop
spring.sql.init.mode=always
spring.sql.init.continue-on-error=false

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.web.access=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

jwt.secret=${JWT_SECRET:CineEsLaMejorPeliculaQueHeVistoNuncaYSiempreQuieroVolverAVerlaConMisAmigosYFamiliares}
jwt.expiration=${JWT_EXPIRATION:86400}

spring.web.error.include-message=always
spring.web.error.include-stacktrace=never

springdoc.swagger-ui.enabled=true
spring.graphql.graphiql.enabled=true
spring.graphql.graphiql.path=/graphiql
spring.graphql.http.path=/graphql

app.peliculas.poster-dir=${POSTER_DIR:uploads/peliculas}

## Traducción automática — DeepL
# Deja deepl.api.key vacío en dev para que la app funcione sin llamadas a la API.
# El auto-seed se puede deshabilitar para no gastar cuota en cada reinicio H2.
deepl.api.url=https://api-free.deepl.com/v2/translate
deepl.api.key=${DEEPL_API_KEY:}
app.traduccion.auto-seed=${TRADUCCION_AUTO_SEED:true}

spring.devtools.restart.enabled=false
spring.devtools.restart.additional-paths=src/main/java,src/main/resources
spring.devtools.restart.exclude=static/**,public/**
spring.devtools.livereload.enabled=true
spring.devtools.livereload.port=35729
